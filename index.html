<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>機材予約システム</title>
  <!-- Element Plus and Vue via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <style>
    body {
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 40px;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: auto;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="app" class="container">
    <!-- Login view -->
    <div v-if="!loggedIn">
      <h2 class="header">ログイン</h2>
      <el-form @submit.prevent="login">
        <el-form-item label="ユーザー名">
          <el-input v-model="username" placeholder="ユーザー名"></el-input>
        </el-form-item>
        <el-form-item label="パスワード">
          <el-input type="password" v-model="password" placeholder="パスワード"></el-input>
        </el-form-item>
        <el-button type="primary" @click="login">ログイン</el-button>
      </el-form>
    </div>
    <!-- Reservation view -->
    <div v-else>
      <h2 class="header">機材予約</h2>
      <el-form @submit.prevent="reserve">
        <el-form-item label="機材">
          <el-select v-model="selectedMachine" placeholder="選択してください">
            <el-option label="3Dプリンター" value="3d_printer"></el-option>
            <el-option label="レーザー機" value="laser"></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="開始日時">
          <el-date-picker v-model="startDate" type="datetime" placeholder="開始日時"></el-date-picker>
        </el-form-item>
        <el-form-item label="終了日時">
          <el-date-picker v-model="endDate" type="datetime" placeholder="終了日時"></el-date-picker>
        </el-form-item>
        <el-button type="primary" @click="reserve">予約</el-button>
        <el-button type="text" @click="logout">ログアウト</el-button>
      </el-form>
      <h3>予約一覧</h3>
      <el-table :data="reservations" style="width: 100%">
        <el-table-column label="機材" prop="machine"></el-table-column>
        <el-table-column label="開始" prop="start"></el-table-column>
        <el-table-column label="終了" prop="end"></el-table-column>
      </el-table>
    </div>
  </div>
<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      loggedIn: false,
      username: '',
      password: '',
      selectedMachine: '',
      startDate: '',
      endDate: '',
      reservations: []
    };
  },
  methods: {
    login() {
      if (this.username && this.password) {
        this.loggedIn = true;
      }
    },
    logout() {
      this.loggedIn = false;
      this.username = '';
      this.password = '';
    },
    reserve() {
      if (!this.selectedMachine || !this.startDate || !this.endDate) return;
      this.reservations.push({
        machine: this.selectedMachine === '3d_printer' ? '3Dプリンター' : 'レーザー機',
        start: this.startDate,
        end: this.endDate
      });
      this.selectedMachine = '';
      this.startDate = '';
      this.endDate = '';
    }
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
